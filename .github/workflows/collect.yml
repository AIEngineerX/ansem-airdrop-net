name: collect-snapshot
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
concurrency:
  group: collect-snapshot
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Seed prev.json from the data branch, else bootstrap from the committed seed
        run: |
          git fetch origin data || true
          if git show origin/data:snapshot.json > prev.json 2>/dev/null; then
            echo "prev = live data-branch snapshot"
          else
            cp public/snapshot.seed.json prev.json
            echo "prev = committed seed (first-run bootstrap: full 702-wallet backfill)"
          fi
      - name: Collect (incremental + backfill chunk via sync over prev)
        env:
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
        run: node --import tsx scripts/collect-snapshot.ts --in prev.json --out snapshot.json --mode sync --max 1000
      - name: Commit to data branch (append — never force-push)
        # Force-pushing the data branch rewrites its history every run. A non-fast-forward
        # ref update breaks raw.githubusercontent / CDN caching: the branch-ref→content
        # mapping does not re-resolve cleanly, so the CDN serves an old commit for a long time
        # (observed a ~40-min serve lag, and earlier the same class of bug on jsDelivr). A
        # normal fast-forward commit onto origin/data avoids that AND preserves every file
        # already on the branch (snapshot.json, the seed, pump-lifetime.json).
        run: |
          git config user.name "AIEngineerX"
          git config user.email "195990077+AIEngineerX@users.noreply.github.com"
          cp snapshot.json "$RUNNER_TEMP/snapshot.json"
          git fetch origin data --depth=1
          git checkout -B data origin/data
          cp "$RUNNER_TEMP/snapshot.json" snapshot.json
          git add -f snapshot.json
          git commit -m "data: snapshot $(date -u +%FT%TZ) [skip ci]" || { echo "no change"; exit 0; }
          git push origin data
        # No CDN purge step: with fast-forward commits the site reads the data branch fresh
        # from raw.githubusercontent.com within its normal cache window (~1-5 min).
