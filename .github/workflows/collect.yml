name: collect-snapshot
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
concurrency:
  group: collect-snapshot
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Seed prev.json from the data branch, else bootstrap from the committed seed
        run: |
          git fetch origin data || true
          if git show origin/data:snapshot.json > prev.json 2>/dev/null; then
            echo "prev = live data-branch snapshot"
          else
            cp public/snapshot.seed.json prev.json
            echo "prev = committed seed (first-run bootstrap: full 702-wallet backfill)"
          fi
      - name: Collect (incremental + backfill chunk via sync over prev)
        env:
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
        run: node --import tsx scripts/collect-snapshot.ts --in prev.json --out snapshot.json --mode sync --max 1000
      - name: Commit to data branch
        run: |
          git config user.name "AIEngineerX"
          git config user.email "195990077+AIEngineerX@users.noreply.github.com"
          git checkout -B data
          git add -f snapshot.json
          git commit -m "data: snapshot $(date -u +%FT%TZ) [skip ci]" || echo "no change"
          git push -f origin data
      - name: Purge jsDelivr until it serves the new snapshot (verify + retry)
        # jsDelivr caches the @data branch ref by path and ignores query strings, so a
        # client cache-buster can't defeat it — only a purge does. A bare purge fired right
        # after the push re-caches the OLD content because GitHub hasn't propagated yet.
        # So: wait for propagation, then purge and VERIFY jsDelivr now serves the new
        # collectedAt, retrying until it does.
        run: |
          want=$(node -e "process.stdout.write(require('./snapshot.json').collectedAt)")
          echo "want collectedAt: $want"
          sleep 10
          for i in 1 2 3 4 5 6; do
            curl -sf "https://purge.jsdelivr.net/gh/AIEngineerX/ansem-airdrop-net@data/snapshot.json" > /dev/null || true
            sleep 5
            got=$(curl -s "https://cdn.jsdelivr.net/gh/AIEngineerX/ansem-airdrop-net@data/snapshot.json" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{process.stdout.write(JSON.parse(d).collectedAt)}catch(e){process.stdout.write('')}})")
            if [ "$got" = "$want" ]; then echo "jsDelivr fresh after purge #$i"; exit 0; fi
            echo "purge #$i: jsDelivr still '$got', retrying"
          done
          echo "jsDelivr still stale after 6 attempts (best-effort; client falls back to seed)"
